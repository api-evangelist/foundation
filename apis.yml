name: Foundation
description: Foundation is a creator-focused NFT marketplace built on Ethereum that
  enables digital artists to mint, showcase, and auction unique digital artworks.
  The platform provides a GraphQL API via The Graph protocol for querying artwork,
  auctions, bids, collector profiles, offers, buy-now listings, and edition drop data.
  Foundation smart contracts remain live on Ethereum mainnet, and the subgraph continues
  to index on-chain activity for programmatic access.
