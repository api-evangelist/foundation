apis:
- name: Foundation Subgraph API
  description: GraphQL API powered by The Graph protocol that indexes all Foundation
    NFT marketplace activity on Ethereum mainnet. Supports queries for NFTs, creators,
    collectors, auctions, bids, offers, buy-now listings, percent splits, FETH escrow
    balances, and full event history. Developers use this as the primary programmatic
    interface to Foundation on-chain data.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
