- name: Foundation Smart Contract API
  description: Ethereum smart contract interface for direct on-chain interaction with
    Foundation marketplace contracts. Supports minting NFTs, creating and bidding
    in auctions, placing and accepting offers, buy-now listings, and deploying NFT
    collection contracts via the factory. Contracts are deployed on Ethereum mainnet
    and remain operational for direct RPC access via providers such as Alchemy or
    Infura.
